apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipment-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shipment-app
  template:
    metadata:
      labels:
        app: shipment-app
    spec:
      containers:
        - name: shipment-app
          image: pradeep6666/shipment-app:latest
          ports:
            - containerPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: shipment-service
spec:
  type: NodePort
  selector:
    app: shipment-app
  ports:
    - port: 80
      targetPort: 9090
      nodePort: 30008
